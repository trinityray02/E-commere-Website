<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Trendy Shop</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div id="sparkle-container"></div>
  <header>
    <div class="logo">🛍️ Trendy Shop</div>
    <nav>
      <a href="index.html" class="cart">← Back to Shop</a>
    </nav>
  </header>

  <section class="checkout">
    <h2>Your Cart</h2>
    <ul id="cart-list"></ul>
    <h3>Total: <span id="total-price">$0.00</span></h3>
    <button class="btn">Proceed to Payment</button>
  </section>

  <footer>
    <p>© 2025 Trendy Shop. All rights reserved.</p>
  </footer>
</body>
</html>
